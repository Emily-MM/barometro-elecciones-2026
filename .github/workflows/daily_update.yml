name: Actualización diaria

on:
  schedule:
    - cron: '0 11 * * *'   
    - cron: '0 23 * * *'  
  workflow_dispatch:        

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Fetch YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      - name: Fetch Reddit
        run: python scripts/fetch_reddit.py

      - name: Fetch Google Trends
        run: python scripts/fetch_trends.py

      - name: Análisis de sentimiento
        run: python scripts/analyze_sentiment.py

      - name: Merge diario
        run: python scripts/merge_daily.py

      - name: Commit y push de datos nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "data: actualización $(date +'%Y-%m-%d %H:%M UTC')"
          git push